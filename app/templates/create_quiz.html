<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduSaint - Create Quiz</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/create_course.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_sidebar.css') }}" />

<style>
.tags-input-container .tag,
.tags-input-container .tag-remove,
.upload-btn {
cursor: pointer;
}
</style>
</head>

<body>
<div class="dashboard">

{% set active = 'create_quiz' %}
{% include 'admin_sidebar.html' %}

<main class="main-content">

<!-- HEADER -->
<div class="header">
<div class="header-left">
<h1>Quiz Management</h1>
<p>Create and manage quizzes for your courses</p>
</div>
</div>

<div class="course-creation">

<!-- PAGE HEADER -->
<div class="page-header">
<h1 class="page-title">Create New Quiz</h1>
<div class="page-actions">
<button type="button" class="btn btn-outline" id="cancelBtn">
<i class="fas fa-times"></i> Cancel
</button>

<button form="quizForm" type="submit" class="btn btn-primary">
<i class="fas fa-save"></i> Save Quiz
</button>
</div>
</div>

<form id="quizForm" class="course-form-container" method="post" action="" enctype="multipart/form-data">

<div class="course-main">

<!-- BASIC INFO -->
<div class="form-section">
<h2 class="section-title">
<i class="fas fa-info-circle"></i> Basic Information
</h2>

<div class="form-group">
<label for="quizTitle">Quiz Title *</label>
<input type="text" id="quizTitle" name="title" required
placeholder="e.g., Trigonometry Practice Test"/>
</div>

<div class="form-group">
<label for="quizDescription">Quiz Description</label>
<textarea id="quizDescription" name="description"
placeholder="Describe this quiz..."></textarea>
</div>
</div>


<!-- QUIZ SETTINGS -->
<div class="form-section">
<h2 class="section-title">
<i class="fas fa-cog"></i> Quiz Settings
</h2>

<div class="settings-grid">
<div class="form-group">
<label for="quizTimeLimit">Time Limit (Minutes)</label>
<input type="number" id="quizTimeLimit"
name="time_limit" min="1"
placeholder="e.g., 30"/>
</div>

<div class="form-group">
<label for="quizTotalMarks">Total Marks</label>
<input type="number" id="quizTotalMarks"
name="total_marks" min="1"
placeholder="e.g., 100"/>
</div>
</div>

<div class="settings-grid">
<div class="form-group">
<label for="quizQuestions">Number of Questions</label>
<input type="number" id="quizQuestions"
name="total_questions" min="1"
placeholder="e.g., 20"/>
</div>

<div class="form-group">
<label for="quizDifficulty">Difficulty Level</label>
<select id="quizDifficulty" name="difficulty">
<option value="">Select Difficulty</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>
</div>
</div>
</div>

</div>


<!-- SIDEBAR -->
<div class="course-sidebar">

<!-- THUMBNAIL -->
<div class="sidebar-section">
<h3 class="sidebar-title">
<i class="fas fa-image"></i> Quiz Thumbnail
</h3>

<div class="image-upload">
<input type="file" id="thumbnail"
name="thumbnail" accept="image/*"
style="display:none;"/>

<img id="previewImage"
src="https://via.placeholder.com/320x180.png?text=Quiz+Thumbnail"
style="width:100%;border-radius:6px;margin-bottom:8px;"/>

<button class="upload-btn">Choose Image</button>
</div>
</div>


<!-- CLASS & COURSE -->
<div class="sidebar-section">
<h3 class="sidebar-title">
<i class="fas fa-layer-group"></i> Class & Course
</h3>

<div class="form-group">
<label for="quizClass">Class *</label>
<select id="quizClass" name="class" required>
<option value="">Select Class</option>
{% for i in range(1,13) %}
<option value="{{ i }}">Class {{ i }}</option>
{% endfor %}
</select>
</div>

<div class="form-group">
<label for="quizCategory">Course *</label>
<select id="quizCategory" name="category" required>
<option value="">Select Course</option>
<option value="mathematics">Mathematics</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="physics">Physics</option>
<option value="chemistry">Chemistry</option>
<option value="biology">Biology</option>
<option value="computer">Computer Science</option>
</select>
</div>
</div>


</div>
</form>

</div>
</main>
</div>


<!-- JAVASCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', function () {

const uploadBtn = document.querySelector('.upload-btn');
const thumbnailInput = document.getElementById('thumbnail');
const previewImage = document.getElementById('previewImage');
const cancelBtn = document.getElementById('cancelBtn');
const classSelect = document.getElementById('quizClass');
const courseSelect = document.getElementById('quizCategory');

if (uploadBtn) {
uploadBtn.addEventListener('click', function (e) {
e.preventDefault();
thumbnailInput.click();
});
}

if (thumbnailInput) {
thumbnailInput.addEventListener('change', function () {
const file = this.files[0];
if (file) {
const reader = new FileReader();
reader.onload = e => previewImage.src = e.target.result;
reader.readAsDataURL(file);
}
});
}

if (cancelBtn) {
cancelBtn.addEventListener('click', function () {
if (confirm('Discard changes?')) {
{% if course_id %}
window.location.href = '{{ url_for('admin_bp.quiz_content_page', course_id=course_id) }}';
{% else %}
window.location.href = '{{ url_for('admin_bp.quizzes_page') }}';
{% endif %}
}
});
}

// Dynamically filter Course options based on selected Class
function populateCourseOptions(options, placeholderText) {
	if (!courseSelect) return;
	courseSelect.innerHTML = '';
	const placeholder = document.createElement('option');
	placeholder.value = '';
	placeholder.textContent = placeholderText || 'Select Course';
	courseSelect.appendChild(placeholder);

	if (!options || !options.length) {
		return;
	}

	options.forEach(function (c) {
		const opt = document.createElement('option');
		// store course title in value so it fits existing PracticeQuiz.category
		opt.value = c.title || '';
		opt.textContent = c.title || ('Course ' + (c.id || ''));
		if (c.class_name) {
			opt.dataset.className = c.class_name;
		}
		courseSelect.appendChild(opt);
	});
}

async function loadCoursesForClass(classValue, selectedTitle) {
	if (!courseSelect) return;

	const trimmed = (classValue || '').toString().trim();
	if (!trimmed) {
		populateCourseOptions([], 'Select Course');
		return;
	}

	// Show loading state
	populateCourseOptions([], 'Loading courses...');

	try {
		const resp = await fetch('/api/v1/classes/' + encodeURIComponent(trimmed) + '/courses?limit=200', {
			method: 'GET',
			headers: {
				'Accept': 'application/json'
			},
			credentials: 'same-origin'
		});

		if (!resp.ok) {
			console.error('Failed to load courses for class', trimmed, resp.status);
			populateCourseOptions([], 'Failed to load courses');
			return;
		}

		const data = await resp.json();
		const courses = (data && (data.data || data.courses)) || [];
		// Normalize to objects with id/title/class_name
		const normalized = courses.map(function (c) {
			return {
				id: c.id,
				title: c.title || c.name || '',
				class_name: c.class_name || ''
			};
		}).filter(function (c) { return c.title; });

		if (!normalized.length) {
			populateCourseOptions([], 'No courses for this class');
			return;
		}

		populateCourseOptions(normalized, 'Select Course');

		// If a specific course title was requested (e.g. from quiz manager),
		// auto-select it when present.
		if (selectedTitle) {
			const target = String(selectedTitle).trim().toLowerCase();
			Array.from(courseSelect.options).forEach(function (opt) {
				if (opt.value && opt.value.toLowerCase() === target) {
					courseSelect.value = opt.value;
				}
			});
		}
	} catch (err) {
		console.error('Error loading courses for class', trimmed, err);
		populateCourseOptions([], 'Failed to load courses');
	}
}

if (classSelect && courseSelect) {
	classSelect.addEventListener('change', function () {
		loadCoursesForClass(this.value);
	});
}

// Auto-fill class & course when opened from Quiz Manager
try {
	const params = new URLSearchParams(window.location.search || '');
	const fromClass = params.get('class');
	const fromCourseTitle = params.get('course_title');
	if (fromClass && classSelect) {
		classSelect.value = fromClass;
		loadCoursesForClass(fromClass, fromCourseTitle || undefined);
	}
} catch (e) {
	console.error('Failed to apply prefilled class/course from URL', e);
}

});
</script>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
